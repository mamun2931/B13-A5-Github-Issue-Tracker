<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TRACKER</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon" />

    <!-- tailwindcss CDN+ daisyUI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font family -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
</head>
<body>
     <header class="bg-white shadow-sm py-5 sticky top-0 z-50">
        <nav class="flex flex-col sm:flex-row justify-between items-center mx-20 space-y-4">
            <div class="flex items-center ">
                <img class="w-10 mr-2" src="assets/github-logo.png" alt="">
                <h2 class="font-semibold text-[#1F2937] text-2xl">GitHub Issues Tracker</h2>
            </div>

            <div class="flex gap-1">
                <input class="px-4 py-1 rounded-md" type="search" placeholder="search" name="" id="search">
                <button id="search-btn" class="btn btn-primary">search</button>
            </div>
        </nav>
     </header>

     <main class=" w-11/12 md:w-10/12 lg:w-9/12 mx-auto mt-5 ">
        <section id="btn-container" class=" p-4 bg-white shadow-sm space-y-2">
            
           <button id="allBtn" class="btn btn-primary px-7 ">All</button>

        </section>

        <section class="flex flex-col md:flex-row justify-between py-4 mt-4 px-3 items-center shadow-sm" >
          <div class="flex gap-3 space-y-1">
                <div class="flex items-center bg-[#4A00FF50] p-2 rounded-full">
                  <img class="z-10" src="assets/Aperture.png" alt="Aperture">
                </div>
            <div>
              <h3 class="font-semibold text-lg text-[#1F2937] "><span id="count">0</span> Issues</h3>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex gap-2">
            <img class="w-7 h-7" src="assets/Open-Status.png" alt="">
            <p>Open</p>
            <img class="w-7 h-7" src="assets/Closed- Status .png" alt="">
            <p>Close</p>
          </div>
        </section>


        <section id="all_Container" class=" mt-7 shadow-sm grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 p-4">


        </section>

              <section id="loading_Spinner" class="flex mt-50 justify-center items-center hidden">
                <span class="loading loading-bars loading-xl"></span>
              </section>
     </main> 

      <section>
        <!-- Open the modal using ID.showModal() method -->
          <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
              <div id="modal-container" class="space-y-5">

              </div>
              <div class="modal-action">
                <form method="dialog">
                  <!-- if there is a button in form, it will close the modal -->
                  <button class="btn btn-primary">Close</button>
                </form>
              </div>
            </div>
          </dialog>
      </section>
     
     <script src="script/home.js"></script>
</body>
</html>
