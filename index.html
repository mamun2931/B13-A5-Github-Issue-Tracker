<!doctype html data-theme="light">
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRACKER LOGIN</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon" />

    <!-- tailwindcss + daisyUI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font family -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body>
    <main class=" mt-10 bg-[#ffffff] max-w-md mx-auto  rounded-lg shadow-lg" >
       <div class="text-center mx-auto pt-10 space-y-4">
        <img class="mx-auto" src="assets/github-logo.png" alt="">
      <div>
       <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
      <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>
    </div>

    <div class="from pt-10">
      <div
        class="card bg-base-100 w-fu  ll max-w-sm shrink-0 shadow-2 mx-auto rounded-lg"
      >
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-[#3D3746] font-bold">Username</label>
            <input
            id="user"
              type="text"
              class="input bg-base-200 rounded-lg"
              placeholder="Enter Username"
            />
                <p class="text-[#4A00FF]">Default: admin</p>

            <label class="label text-[#3D3746] font-bold">Password</label>
            <input
                id="pin"
              type="password"
              class="input bg-base-200 rounded-lg "
              placeholder="Enter Password"
            />
            <p class="text-[#4A00FF]">Default: admin123</p>
            <button id="login-btn" class="btn btn-primary rounded-lg mt-4">Sign In </button>
          </fieldset>

              <div class="flex items-center justify-center gap-4 mb-4">
                  <hr class="w-40 border-gray-300">
                  <span class="text-gray-500 font-semibold">OR</span>
                  <hr class="w-40 border-gray-300">
              </div>

              <div class="text-center space-y-3">
                <p class="text-[#64748B] text-sm">Demo Credentials:</p>
                <div><span class="font-bold">Username:</span> admin <br> <span class="font-bold">Password:</span> admin123</div>
            
              </div>
              
        </div>
      </div>
    </div>
              <h1>hello</h1>
    </main>
    <script src="script/login.js"></script>
  </body>
</html>
